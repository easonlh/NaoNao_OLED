[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

# Wi-Fi 凭证从 .env 注入（编译时）
# 用法: source .env && pio run --target upload
build_flags =
  -DCONFIG_WIFI_SSID=\"${sysenv.WIFI_SSID}\"
  -DCONFIG_WIFI_PASSWORD=\"${sysenv.WIFI_PASSWORD}\"

# 其他配置（天气/MQTT/GitHub/OTA）在 src/config.cpp 中设置

# 库依赖
lib_deps =
    olikraus/U8g2 @ ^2.36.18
    bblanchon/ArduinoJson @ ^7
    knolleary/PubSubClient @ ^2.8

# 空间分配：huge_app.csv 提供约 3MB Flash
board_build.partitions = huge_app.csv

# 稳定性
upload_speed = 115200

# 串口监视
monitor_speed = 115200
