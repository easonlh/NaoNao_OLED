[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

# 从 .env 文件读取 Wi-Fi 配置（编译时注入）
# 用法: source .env && pio run --target upload
build_flags =
  -DCONFIG_WIFI_SSID=\"${sysenv.WIFI_SSID}\"
  -DCONFIG_WIFI_PASSWORD=\"${sysenv.WIFI_PASSWORD}\"

# 1. 库依赖更新：虽然 WiFi.h 是内置的，但显式声明 U8g2 依然必要
lib_deps = 
    olikraus/U8g2 @ ^2.36.18

# 2. 空间分配：保持 huge_app.csv，因为 WiFi + BLE 协议栈非常吃 Flash
board_build.partitions = huge_app.csv

# 3. 稳定性优化：保持 115200 防止 Mac Mini 再次出现 termios.error
upload_speed = 115200

# 4. 强烈建议添加：监控串口输出（否则你看不见 ESP32 连接 Wi-Fi 的日志）
monitor_speed = 115200